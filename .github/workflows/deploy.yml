# ═══════════════════════════════════════════════════════════════
# CI/CD PIPELINE
# Triggered on every push to the main branch
# Does three things:
#   1. Builds a Docker image
#   2. Pushes it to ECR
#   3. Forces a new ECS deployment
# Uses OIDC — no long-lived AWS credentials anywhere
# ═══════════════════════════════════════════════════════════════

name: Deploy to ECS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  # ─── Job 1: Test ─────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./app

      - name: Run tests
        run: npm test
        working-directory: ./app

  # ─── Job 2: Deploy ───────────────────────────────────────
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate to AWS via OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::989346120260:role/my-app-v2-github-actions-role
          aws-region: eu-west-2

      # ── Check infrastructure exists before deploying ──────
      # If ECS cluster doesn't exist (terraform not applied yet)
      # we skip the deploy steps gracefully instead of failing
      - name: Check if ECS cluster exists
        id: check-infra
        run: |
          if aws ecs describe-clusters \
            --clusters my-app-v2-cluster \
            --region eu-west-2 \
            --query 'clusters[0].status' \
            --output text 2>/dev/null | grep -q "ACTIVE"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Infrastructure found — proceeding with deploy"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ Infrastructure not deployed — skipping deploy"
          fi

      # Log Docker into ECR (only if infra exists)
      - name: Login to Amazon ECR
        if: steps.check-infra.outputs.exists == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build and push Docker image (only if infra exists)
      - name: Build, tag and push image
        if: steps.check-infra.outputs.exists == 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-app-v2
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            >> $GITHUB_OUTPUT

      # Deploy to ECS (only if infra exists)
      - name: Deploy to ECS
        if: steps.check-infra.outputs.exists == 'true'
        run: |
          aws ecs update-service \
            --cluster my-app-v2-cluster \
            --service my-app-v2-service \
            --force-new-deployment \
            --region eu-west-2

          echo "✅ Deployed: ${{ github.sha }}"

      # Friendly message when skipping
      - name: Skipping deploy (no infrastructure)
        if: steps.check-infra.outputs.exists == 'false'
        run: |
          echo "⚠️ Deploy skipped — run terraform apply first"
          echo "Once infrastructure exists, push again to deploy"